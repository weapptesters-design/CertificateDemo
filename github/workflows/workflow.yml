name: WAT Certificate Automation

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI
    inputs:
      force_run:
        description: 'Force run even if no changes'
        required: false
        default: 'false'

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to push previous_orders.json back

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Node.js ────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Ensure output dir exists ─────────────────────────────────────────
      - name: Create output directory
        run: mkdir -p output

      # ── 4. Restore previous_orders.json from cache (if not in repo) ─────────
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: output/previous_orders.json
          key: wat-state-${{ github.ref_name }}
          restore-keys: |
            wat-state-

      # ── 5. Run data processing ───────────────────────────────────────────────
      - name: Process CSV & Detect Changes
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
        run: |
          echo "=== Running generate.js ==="
          node generate.js
          echo "=== generate.js complete ==="
          echo "--- report.json preview ---"
          cat output/report.json

      # ── 6. Generate certificates & Send Telegram ─────────────────────────────
      - name: Generate Certificates & Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== Running create-cert.js ==="
          node create-cert.js
          echo "=== create-cert.js complete ==="

      # ── 7. Save updated state ────────────────────────────────────────────────
      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: output/previous_orders.json
          key: wat-state-${{ github.ref_name }}-${{ github.run_id }}

      # ── 8. Commit updated state back to repo (optional but reliable) ─────────
      - name: Commit state to repo
        if: always()
        run: |
          git config user.name  "WAT Bot"
          git config user.email "bot@weapptesters.com"
          git add output/previous_orders.json output/report.json || true
          git diff --staged --quiet || git commit -m "chore: update automation state [skip ci]"
          git push || echo "Nothing to push"

      # ── 9. Upload artifacts for debugging ────────────────────────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wat-run-${{ github.run_id }}
          path: |
            output/report.json
            output/previous_orders.json
            output/*.html
          retention-days: 7
